steps:
  # Build and tag as both latest and the commit SHA (SHA only available via git trigger)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest
      - .

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest

  # Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - oe-app
      - --image
      - us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest
      - --region
      - us-central1
      - --platform
      - managed
      # CPU stays allocated outside requests so background work (Stage-1 config +
      # batch sheet extraction) actually runs — without this Cloud Run freezes
      # background threads after the response and sheets never auto-extract.
      - --no-cpu-throttling
      # Real parallelism for the batch worker pool + headroom for concurrent
      # heavy pages (fitz/OpenCV) so the instance doesn't OOM.
      - --cpu
      - '2'
      - --memory
      - '2Gi'
      # Long requests (large uploads, slow Gemini calls) aren't cut short.
      - --timeout
      - '3600'
      - --quiet

images:
  - 'us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
