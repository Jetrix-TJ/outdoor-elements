steps:
  # Build and tag as both latest and the commit SHA (SHA only available via git trigger)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest
      - .

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest

  # Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - oe-app
      - --image
      - us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest
      - --region
      - us-central1
      - --platform
      - managed
      # CPU stays allocated outside requests so background work (Stage-1 config +
      # batch sheet extraction) actually runs — without this Cloud Run freezes
      # background threads after the response and sheets never auto-extract.
      - --no-cpu-throttling
      # Real parallelism for the batch worker pool + headroom for concurrent
      # heavy pages (fitz/OpenCV) so the instance doesn't OOM.
      - --cpu
      - '2'
      - --memory
      - '8Gi'
      # Stage-2 detection (fitz render + OpenCV connected-components on large
      # landscape sheets) is memory-heavy. Running 3 sheets concurrently on a
      # 2Gi instance OOM-killed the container mid-detection: the overlay PNG was
      # written but the worker died before persisting status="done", so pages
      # hung at "running" forever and the UI never left "extracting 0/N".
      # A single sheet completes comfortably in ~4Gi, so run 2 sheets in
      # parallel within an 8Gi budget (~4Gi each) — ~2x faster on multi-sheet
      # jobs than the sequential 1-worker setting, still well clear of OOM.
      # --update-env-vars (NOT --set-env-vars) so existing GEMINI_API_KEY /
      # DATABASE_URL on the service are preserved, not wiped.
      - --update-env-vars
      - OE_BATCH_WORKERS=2
      # Long requests (large uploads, slow Gemini calls) aren't cut short.
      - --timeout
      - '3600'
      # Persist job files (PDFs, thumbnails, overlays, masks) on the GCS jobs
      # bucket via a FUSE volume — Cloud Run's local disk is ephemeral and not
      # shared across instances, so without this the app "works locally but not
      # deployed": pages/thumbnails/overlays vanish after upload. Mount path
      # matches store.JOBS_DIR (/app/backend/jobs).
      - --add-volume=name=jobs,type=cloud-storage,bucket=outdoor-elements-499605-jobs
      - --add-volume-mount=volume=jobs,mount-path=/app/backend/jobs
      - --quiet

images:
  - 'us-central1-docker.pkg.dev/outdoor-elements-499605/oe/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
